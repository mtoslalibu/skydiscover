language: go
file_suffix: .go
diff_based_generation: false
max_iterations: 50
checkpoint_interval: 5
max_solution_length: 40000

llm:
  models:
    - name: "aws/claude-sonnet-4-5"
      weight: 0.7
    - name: "aws/claude-opus-4-6"
      weight: 0.3
  api_base: "https://ete-litellm.ai-models.vpc-int.res.ibm.com"
  temperature: 1.0
  top_p: null
  max_tokens: 32000
  timeout: 120

prompt:
  system_message: |
    You are optimizing a routing algorithm for a 4-instance LLM inference cluster.
    Goal: minimize end-to-end latency on the sweet workload (bursty prefix-heavy traffic).

    BASELINE: 1:1 weighted router — fixed 0.5 prefix-affinity + 0.5 load-balance.
    Vulnerable to burst hotspotting: all dominant-group traffic routes to one cached instance,
    causing a massive pileup during spikes.

    WORKLOAD (sweet): 125 QPS, 4 instances, 14336-token prefixes.
      Group A (45%, CV=9 gamma bursts): dominant prefix group, batch, output ~90 tokens.
        During CV=9 bursts, momentary rate spikes to ~9x mean — all routed to one instance by 1:1.
      Groups B-E (18/12/10/9%): secondary prefix groups, interactive/realtime, moderate burstiness.
      Group F (9%): no prefix, realtime.

    SCORERS (from routing_policy.yaml, loaded into ws.scorers/ws.weights):
      ws.scorers[0] (weight 0.5) — prefix-affinity: returns ~1.0 for cached instances, ~0.0 otherwise.
        Stateful LRU — observer updates automatically after routing. Fresh signal.
      ws.scorers[1] (weight 0.5) — load-balance: 1/(1+EffectiveLoad()). Partly stale.

    KEY SIGNALS:
      snap.InFlightRequests — FRESH (updated before every routing call). Best load signal.
      snap.KVUtilization — stale (5s). Bursts are short — KV lags behind. Use only as safety filter.
      snap.QueueDepth, snap.BatchSize — stale (5s). Avoid as primary load signal.

    OPPORTUNITY: During CV=9 bursts, Group A floods the cached instance while others sit idle.
    The fix: detect the load gap via InFlightRequests and decay the prefix-affinity weight
    proportionally. During calm periods, preserve full affinity (cache hits are valuable).
    An algorithm that does this correctly can beat the baseline by 25%+ on this workload.

    RULES:
    1. Only modify code between EVOLVE-BLOCK-START and EVOLVE-BLOCK-END
    2. Valid Go — guard divisions against zero
    3. scores[snap.ID] must be set for every instance; bestIdx must be valid
    4. Don't remove load-balancing entirely — it prevents starvation

    Score = % improvement over baseline on sweet workload. Positive = better.

search:
  type: "adaevolve"
  num_context_programs: 4
  database:
    random_seed: 42

evaluator:
  timeout: 300
  cascade_evaluation: false
